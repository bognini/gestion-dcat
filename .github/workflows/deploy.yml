name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 15m
          script: |
            cd ~/gestion-dcat
            git pull origin main
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            docker system prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            sleep 10
            curl -sf https://gestion.dcat.ci/api/health || exit 1
            echo "✅ Deployment verified successfully"

      - name: Cleanup expired sessions
        run: |
          curl -sf -X POST https://gestion.dcat.ci/api/internal/cleanup \
            -H "Authorization: Bearer ${{ secrets.CLEANUP_SECRET }}" \
            -H "Content-Type: application/json" \
            || echo "⚠️ Session cleanup skipped (CLEANUP_SECRET not set)"

      - name: Notify success
        if: success()
        run: |
          echo "🚀 Deployment to gestion.dcat.ci completed successfully"
          echo "Commit: ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment to gestion.dcat.ci failed"
          echo "Commit: ${{ github.sha }}"
          echo "Please check the server logs"
